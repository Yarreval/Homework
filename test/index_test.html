<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Weather Frecast</title>
	<link rel="stylesheet" href="assets/css/style.css">
	<link rel="stylesheet" href="assets/weather-icons/css/weather-icons.min.css">
</head>

<body>
	<div class="wrapper">
	
		<div class="content">
		
			<div class="lisbon">
				<span>Lisbon</span>
				<p>21
					<i class="wi wi-celsius"></i>
					<i class="wi wi-day-sunny"></i>
				</p>
			</div>
			
			<div class="paris">
				<span>Paris</span>
				<p>19
					<i class="wi wi-celsius"></i>
					<i class="wi wi-night-showers"></i>
				</p>
			</div>
			<div class="belgrad">
				<span>Belgrade</span>
				<p>5
					<i class="wi wi-celsius"></i>
					<i class="wi wi-day-cloudy"></i>
				</p>
			</div>
			<div class="moscow">
				<span>Venice</span>
				<p>21
					<i class="wi wi-celsius"></i>
					<i class="wi wi-day-cloudy-high"></i>
				</p>
			</div>
			<div class="telaviv">
				<span>Tel Aviv</span>
				<p>32
					<i class="wi wi-celsius"></i>
					<i class="wi wi-hot"></i>
				</p>
			</div>
			<div class="cair">
				<span>Kyiv </span>
				<p>22
					<i class="wi wi-celsius"></i>
					<i class="wi wi-day-sunny"></i>
				</p>
			</div>
			<div class="newyork">
				<span>Amsterdam</span>
				<p>28
					<i class="wi wi-celsius"></i>
					<i class="wi wi-day-sleet-storm"></i>
				</p>
			</div>
			<div class="newdelhi">
				<span>Tokyo</span>
				<p>17
					<i class="wi wi-celsius"></i>
					<i class="wi wi-hail"></i>
				</p>
			</div>
			<div class="sanfranc">
				<span>San Francisco</span>
				<p>15
					<i class="wi wi-celsius"></i>
					<i class="wi wi-day-cloudy"></i>
				</p>
			</div>
			<div class="sydney">
				<span>Sydney</span>
				<p>8
					<i class="wi wi-celsius"></i>
					<i class="wi wi-night-clear"></i>
				</p>
			</div>
			<div class="sydney">
				<span>New Delhi</span>
				<p>33
					<i class="wi wi-celsius"></i>
					<i class="wi wi-night-cloudy"></i>
				</p>
			</div>
		</div>

</body>

</html>
